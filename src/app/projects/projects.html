<div class="quests-screen">
  <section class="panel hud">
    <div class="panel-title">
      <span class="icon">📜</span>
      Log de Missões

      <span class="hud-meta">
        <span class="dot">•</span>
        Finalizados: {{ completedCount }}
        <span class="dot">•</span>
        Em andamento: {{ inProgressCount }}
      </span>
    </div>

    <div class="badges compact">
      <span class="badge">🏆 Rewards</span>
      <span class="badge">⚡ XP</span>
      <span class="badge">🧩 Stack</span>
      <span class="badge">🎯 Impact</span>
    </div>
  </section>

  <div class="scroll-area">
    <div class="grid">
      <article
        class="quest-card"
        *ngFor="let q of quests"
        tabindex="0"
        (click)="openQuest(q)"
        (keydown.enter)="openQuest(q)"
      >
        <div class="quest-cover">
          <img [src]="q.images[0].src" [alt]="q.images[0].alt" />
        </div>

        <div class="quest-body">
          <div class="quest-top">
            <div class="quest-title">{{ q.title }}</div>
            <div class="pill-row">
              <span [class]="statusClass(q.status)">{{ q.status }}</span>
              <span [class]="diffClass(q.difficulty)">{{ q.difficulty }}</span>
            </div>
          </div>

          <div class="quest-sub">{{ q.subtitle }}</div>

          <div class="row">
            <div class="mini">
              <div class="mini-label">⚡ XP</div>
              <div class="mini-value">{{ q.xp }}</div>
            </div>

            <div class="mini">
              <div class="mini-label">🎁 Recompensas</div>
              <div class="mini-value">{{ q.reward }}</div>
            </div>
          </div>

          <div class="tech">
            <span class="chip" *ngFor="let t of q.tech">{{ t }}</span>
          </div>

          <div class="hint">Click to inspect</div>
        </div>
      </article>
    </div>
  </div>
</div>
